name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Triggers the action every time you push to the main branch

permissions:
  contents: write  # Allows the tool to push the built files to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # Matches modern Angular versions
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Configure Git Identity
        run: |
          git config --global user.email "tejasvipatel116@gmail.com"
          git config --global user.name "TejuPatel116"

      - name: Build and Deploy
        # Make sure to replace YOUR_REPOSITORY_NAME with your actual GitHub repository name
        run: |
          npx ng deploy --base-href=https://tejupatel116.github.io/hbd-app/ --no-silent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
